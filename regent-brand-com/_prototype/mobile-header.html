<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile Header — Regent Brand.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

  <style>
    /* ─── Regent Design Tokens (from Figma) ──────────────────── */
    :root {
      /* Header */
      --header-bg:           white;
      --header-text-primary: #121212;
      --header-margin:       28px;   /* --margin/default */
      --header-pr:           20px;   /* --space/md */
      --header-py:           12px;   /* --space/12 */

      /* Border */
      --border-width:        1px;    /* --border/width/default */
      --border-radius:       6px;    /* --border/radius/default */

      /* Spacing */
      --space-4:  4px;
      --space-6:  6px;
      --space-8:  8px;

      /* Button / sm */
      --btn-font-size:        14px;
      --btn-font-weight:      400;
      --btn-line-height:      20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF8F5;
      min-height: 250vh;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════════════════════════
       COMPONENT: Mobile Header
       ─────────────────────────────────────────────────────────
       States:  .is-transparent  (default, floats over hero)
                .is-solid        (on scroll, white background)
       ═══════════════════════════════════════════════════════════ */

    .mobile-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    /* ── Transparent (default) ── */
    .mobile-header.is-transparent {
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.38) 0%,
        rgba(8,8,8,0.30) 25%,
        rgba(20,20,20,0.20) 50%,
        rgba(30,30,30,0.10) 75%,
        rgba(0,0,0,0) 100%
      );
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    /* ── Solid (scrolled) ── */
    .mobile-header.is-solid {
      background: var(--header-bg);
      box-shadow: 0 1px 0 rgba(0,0,0,0.08);
    }

    /* ─── Nav layouts ────────────────────────────────────────── */

    /* Transparent: 3-column — icon | logo centered | icon */
    /* Figma: p-[12px], justify-between, icon buttons 40×40 */
    .nav-transparent {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      height: 112px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    .mobile-header.is-solid .nav-transparent {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
    }

    .nav-transparent__center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    /* Solid: logo left | actions right */
    /* Figma: pl-[28px] pr-[20px] py-[12px], inner gap-[20px] */
    /* Out of flow by default (transparent state active) */
    .nav-solid {
      display: flex;
      align-items: center;
      gap: 20px;                                                    /* space/md = 20 */
      padding: 12px var(--header-pr) 12px var(--header-margin);    /* py-12 pl-28 pr-20 */
      height: 108px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      position: absolute;
      top: 0; left: 0; right: 0;
    }
    .mobile-header.is-solid .nav-solid {
      opacity: 1;
      pointer-events: auto;
      position: relative;
    }

    .nav-solid__logo {
      display: flex;
      align-items: flex-start;
      flex: 1 0 0;       /* Figma: flex-[1_0_0] — grows to fill, pushes actions right */
      min-width: 0;
    }

    /* Inner wrapper constrained to wordmark width, items centered (Figma: max-w-[104px] items-center) */
    .nav-solid__logo-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 104px;
      gap: 8px;
    }

    .nav-solid__actions {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    /* ─── Icon button (transparent state) ───────────────────── */
    /* Figma: w-[40px] h-[40px] p-[8px] — icon/size/md=24, 8px padding all sides */
    .icon-btn {
      width: 40px; height: 40px;
      padding: 8px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .icon-btn:active { background: rgba(255,255,255,0.12); }

    /* ─── Sign in button (solid state) ──────────────────────── */
    .signin-btn {
      height: 36px;
      padding: 0 var(--space-8);
      border: var(--border-width) solid var(--header-text-primary);
      border-radius: 0;   /* Figma: no rounded corners */
      background: transparent;
      display: flex;
      align-items: center;
      gap: var(--space-6);
      cursor: pointer;
      white-space: nowrap;
    }
    .signin-btn__label {
      font-size: var(--btn-font-size);
      font-weight: var(--btn-font-weight);
      line-height: var(--btn-line-height);
      color: var(--header-text-primary);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0;
    }

    /* ─── Menu button (solid state) ─────────────────────────── */
    .menu-btn {
      width: 36px; height: 36px;
      border-radius: var(--border-radius);
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ─── Regent wordmark sizing ─────────────────────────────── */
    .regent-wordmark--white {
      /* viewBox: 86.49 × 16.75 — white version */
      width: 87px;
      height: auto;
      display: block;
    }
    .regent-wordmark--dark {
      /* viewBox: 103.39 × 20.08 — dark version, slightly wider */
      width: 104px;
      height: auto;
      display: block;
    }
    .regent-location {
      /* viewBox: 73.09 × 15.94 — "Santa Monica Beach" */
      width: 74px;
      height: auto;
      display: block;
    }

    /* ═══════════════════════════════════════════════════════════
       DEMO SCAFFOLD — not part of the component
       ═══════════════════════════════════════════════════════════ */

    .demo-hero {
      height: 100vh;
      background: url('../_assets/_imgs/regent-bali-canggu-main-pool-golden-hour.avif') center/cover no-repeat;
    }
    .demo-content {
      padding: 72px 28px 120px;
    }
    .demo-content h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 40px;
      font-weight: 300;
      line-height: 1.1;
      color: #211551;
      margin-bottom: 20px;
    }
    .demo-content h2 em { font-style: italic; }
    .demo-content p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.8;
      color: rgba(33,21,81,0.55);
    }
  </style>
</head>

<script>
  const header    = document.getElementById('mobileHeader');
  const THRESHOLD = 64;

  window.addEventListener('scroll', () => {
    const solid = window.scrollY > THRESHOLD;
    header.classList.toggle('is-transparent', !solid);
    header.classList.toggle('is-solid',        solid);
  }, { passive: true });
</script>
