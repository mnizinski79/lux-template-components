<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile Header — Regent Brand.com</title>

  <style>
    @font-face {
      font-family: 'Canela';
      src: url('../_assets/_fonts/Canela/Canela-Thin.otf') format('opentype');
      font-weight: 100;
      font-style: normal;
    }
    @font-face {
      font-family: 'Canela';
      src: url('../_assets/_fonts/Canela/Canela-Light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'Canela';
      src: url('../_assets/_fonts/Canela/Canela-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Canela';
      src: url('../_assets/_fonts/Canela/Canela-Light.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Engravers Gothic';
      src: url('../_assets/_fonts/Engravers Gothic/EngraversGothic-Ext.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Engravers Gothic';
      src: url('../_assets/_fonts/Engravers Gothic/EngraversGothic-BoldExt.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    /* ─── Regent Design Tokens (from Figma) ──────────────────── */
    :root {
      /* Header */
      --header-bg:           white;
      --header-text-primary: #121212;
      --header-margin:       28px;   /* --margin/default */
      --header-pr:           20px;   /* --space/md */
      --header-py:           12px;   /* --space/12 */

      /* Border */
      --border-width:        1px;    /* --border/width/default */
      --border-radius:       6px;    /* --border/radius/default */

      /* Spacing */
      --space-4:  4px;
      --space-6:  6px;
      --space-8:  8px;

      /* Button / sm */
      --btn-font-size:        14px;
      --btn-font-weight:      400;
      --btn-line-height:      20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF8F5;
      min-height: 250vh;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    /* ═══════════════════════════════════════════════════════════
       COMPONENT: Mobile Header
       ─────────────────────────────────────────────────────────
       States:  .is-transparent  (default, floats over hero)
                .is-solid        (on scroll, white background)
       ═══════════════════════════════════════════════════════════ */

    .mobile-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    /* ── Transparent (default) — white icons over hero ─────── */
    .mobile-header.is-transparent {
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.38) 0%,
        rgba(8,8,8,0.30) 25%,
        rgba(20,20,20,0.20) 50%,
        rgba(30,30,30,0.10) 75%,
        rgba(0,0,0,0) 100%
      );
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      --fill-0:   white;
      --stroke-0: #F7F7F7;
    }

    /* ── Solid (scrolled) — dark icons on white ─────────────── */
    /* Figma: bg-[--theme/light/color/surface/default] = white   */
    /* Same 3-column layout; icon colors flip via CSS vars       */
    .mobile-header.is-solid {
      background: var(--header-bg);
      box-shadow: 0 1px 0 rgba(0,0,0,0.08);
      --fill-0:   #121212;
      --stroke-0: #121212;
    }

    /* ─── Nav — single layout for both states ────────────────── */
    /* Figma: p-[12px] · justify-between · icon buttons 40×40    */
    .nav-transparent {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      height: 112px;
    }

    .nav-transparent__center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    /* ─── Icon button ────────────────────────────────────────── */
    /* Figma: w-[40px] h-[40px] p-[8px] · border-radius/full    */
    .icon-btn {
      width: 40px; height: 40px;
      padding: 8px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mobile-header.is-transparent .icon-btn:active { background: rgba(255,255,255,0.12); }
    .mobile-header.is-solid      .icon-btn:active { background: rgba(0,0,0,0.06); }

    /* ─── Regent wordmark sizing ─────────────────────────────── */
    .regent-wordmark--white {
      /* viewBox: 86.49 × 16.75 */
      width: 87px;
      height: auto;
      display: block;
    }
    .regent-location {
      /* viewBox: 73.09 × 15.94 — "Santa Monica Beach" */
      width: 74px;
      height: auto;
      display: block;
    }

    /* ═══════════════════════════════════════════════════════════
       DEMO SCAFFOLD — not part of the component
       ═══════════════════════════════════════════════════════════ */

    .demo-hero {
      height: 100vh;
      background: url('../_assets/_imgs/regent-bali-canggu-main-pool-golden-hour.avif') center/cover no-repeat;
    }
    .demo-content {
      padding: 72px 28px 120px;
    }
    .demo-content h2 {
      font-family: 'Canela', Georgia, serif;
      font-size: 40px;
      font-weight: 300;
      line-height: 1.1;
      color: #211551;
      margin-bottom: 20px;
    }
    .demo-content h2 em { font-style: italic; }
    .demo-content p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.8;
      color: rgba(33,21,81,0.55);
    }

    /* ═══════════════════════════════════════════════════════════
       COMPONENT: Sticky CTA Bar
       ═══════════════════════════════════════════════════════════ */
    .sticky-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: #ffffff;
      border-top: 1px solid #d6d6d6;
      padding: 12px 24px 12px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.55s ease, transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sticky-cta.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 56px;
      background: #1f4456;
      color: #ffffff;
      font-family: 'Engravers Gothic', 'Arial Narrow', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s ease;
    }

    .cta-btn:active { background: #163240; }
  </style>
</head>

<script>
  const header    = document.getElementById('mobileHeader');
  const cta       = document.querySelector('.sticky-cta');
  const THRESHOLD     = 64;
  const CTA_THRESHOLD = window.innerHeight * 0.45;
  let lastScrollY = 0;

  window.addEventListener('scroll', () => {
    const scrollY      = window.scrollY;
    const scrollingDown = scrollY > lastScrollY;
    const solid = scrollY > THRESHOLD;

    header.classList.toggle('is-transparent', !solid);
    header.classList.toggle('is-solid',        solid);

    if (scrollingDown && scrollY > CTA_THRESHOLD) {
      cta.classList.add('is-visible');
    } else if (!scrollingDown) {
      cta.classList.remove('is-visible');
    }

    lastScrollY = scrollY;
  }, { passive: true });
</script>

</body>
</html>
