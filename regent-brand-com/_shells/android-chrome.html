<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Chrome Shell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Google Sans', 'Roboto', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Device frame ─────────────────────────────────────────── */
    /* Figma: 412×892px · border-radius 18px · 8px --device-frame  */
    .device {
      position: relative;
      width: 412px;
      height: 892px;
      border-radius: 18px;
      overflow: hidden;
      flex-shrink: 0;
      outline: 8px solid rgba(116,119,117,0.5);
      outline-offset: 0;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    /* ── Figma tokens — light */
    .device[data-mode="light"] {
      --schemes\/surface:    #f4fbf8;
      --schemes\/on-surface: #171d1b;
      --camera:              #2e2e2e;
      --pill-bg:             rgba(23,29,27,0.06);
      --divider:             rgba(23,29,27,0.08);
    }
    /* ── MD3 dark equivalents */
    .device[data-mode="dark"] {
      --schemes\/surface:    #191c1b;
      --schemes\/on-surface: #e1e3e0;
      --camera:              #2e2e2e;
      --pill-bg:             rgba(225,227,224,0.08);
      --divider:             rgba(225,227,224,0.06);
    }

    /* ─── Prototype iframe ────────────────────────────────────── */
    /* Starts below Android chrome: status bar (40px) + address bar (56px) = 96px */
    .proto-frame {
      position: absolute;
      top: 96px;
      left: 0;
      width: 100%;
      height: calc(100% - 96px);
      border: none;
      display: block;
    }

    /* ─── Status bar ──────────────────────────────────────────── */
    /* Figma: 40px · px 16px · bg --schemes/surface               */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--schemes\/surface);
    }

    /* Figma: AOSP/Body/Medium — Roboto Regular 14/20px 0.25px */
    .status-bar__time {
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.25px;
      line-height: 20px;
      font-variation-settings: 'wdth' 100;
      color: var(--schemes\/on-surface);
      white-space: nowrap;
    }

    .status-bar__icons {
      margin-left: auto;
      display: flex;
      align-items: center;
    }

    /* Wi-Fi + Signal overlap group */
    .sbi-wifi-network {
      display: flex;
      align-items: center;
      padding-right: 2px;
    }

    /* Each 16×16 icon slot */
    .sbi-icon {
      position: relative;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Battery wrapper */
    .sbi-battery {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    /* ─── Punch-hole camera ───────────────────────────────────── */
    /* Figma: 24px · top 8px · bg --camera                        */
    .punch-hole {
      position: absolute;
      top: 8px;
      left: 50%; transform: translateX(-50%);
      width: 24px; height: 24px;
      border-radius: 100px;
      background: var(--camera);
      z-index: 30;
      pointer-events: none;
    }

    /* ─── Address bar ─────────────────────────────────────────── */
    .address-bar {
      position: absolute;
      top: 40px; left: 0; right: 0;
      height: 56px;
      background: var(--schemes\/surface);
      display: flex;
      align-items: center;
      padding: 8px 8px 8px 12px;
      gap: 4px;
      z-index: 20;
      border-bottom: 1px solid var(--divider);
    }

    /* ── Omnibox pill ── */
    .omnibox {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      background: var(--pill-bg);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: pointer;
    }

    .omnibox__lock {
      flex-shrink: 0;
      width: 13px; height: 13px;
      opacity: 0.6;
    }
    .omnibox__lock svg { width: 100%; height: 100%; }

    .omnibox__domain {
      flex: 1;
      font-size: 14px;
      font-weight: 400;
      color: var(--schemes\/on-surface);
      text-align: center;
    }

    .omnibox__refresh {
      flex-shrink: 0;
      width: 16px; height: 16px;
      opacity: 0.5;
    }
    .omnibox__refresh svg { width: 100%; height: 100%; }

    /* ── Icon buttons beside omnibox ── */
    .abar-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .abar-btn svg { width: 20px; height: 20px; }

    /* ─── Gesture navigation bar ──────────────────────────────── */
    /* Figma: 24px · handle 108×4px · bg --schemes/surface        */
    .gesture-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      background: var(--schemes\/surface);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    /* Figma: bg --schemes/on-surface · h 4px · w 108px · r 12px */
    .gesture-pill {
      width: 108px; height: 4px;
      border-radius: 12px;
      background: var(--schemes\/on-surface);
    }

    /* ─── External controls ───────────────────────────────────── */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
      z-index: 200;
    }

    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    .ctrl-btn:hover  { background: rgba(255,255,255,0.18); }
    .ctrl-btn.active { background: rgba(255,255,255,0.28); }
  </style>
</head>
<body>

  <div class="device" id="device" data-mode="light">

    <!-- Prototype iframe -->
    <iframe class="proto-frame" id="protoFrame" src="about:blank" allow="autoplay"></iframe>

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-bar__time" id="clock">9:41</span>
      <div class="status-bar__icons">

        <!-- Wi-Fi + Signal (Figma: Wi-Fi Network group, -2px overlap) -->
        <div class="sbi-wifi-network">
          <!-- Wifi: 14×10px centered in 16×16 slot -->
          <div class="sbi-icon" style="margin-right:-2px">
            <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:14px;height:10px;">
              <svg preserveAspectRatio="none" width="100%" height="100%" viewBox="0 0 14.6667 10.3733" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 3.04L7.33333 10.3733L14.6667 3.04C10.6133 -1.01333 4.05333 -1.01333 0 3.04Z" fill="var(--schemes\/on-surface, #171D1B)"/>
              </svg>
            </div>
          </div>
          <!-- Signal: viewBox 13.33×13.33, inset 8.33% all sides -->
          <div class="sbi-icon" style="margin-right:-2px">
            <div style="position:absolute;inset:8.33%;">
              <svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" viewBox="0 0 13.3333 13.3333" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13.3333 0L0 13.3333H13.3333V0Z" fill="var(--schemes\/on-surface, #171D1B)"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Battery: viewBox 8.5×14.167, centered in 16×16 slot -->
        <div class="sbi-battery">
          <div class="sbi-icon">
            <div style="position:absolute;width:8.5px;height:14.167px;left:50%;top:50%;transform:translate(-50%,-50%);">
              <svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" viewBox="0 0 8.5 14.1667" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5.84375 0H2.65625V1.41667H1.0625C0.475697 1.41667 0 1.89236 0 2.47917V13.1042C0 13.691 0.475697 14.1667 1.0625 14.1667H7.4375C8.0243 14.1667 8.5 13.691 8.5 13.1042V2.47917C8.5 1.89236 8.0243 1.41667 7.4375 1.41667H5.84375V0Z" fill="var(--schemes\/on-surface, #171D1B)"/>
              </svg>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Punch-hole camera -->
    <div class="punch-hole" aria-hidden="true"></div>

    <!-- Address bar -->
    <div class="address-bar">
      <div class="omnibox" role="button" aria-label="Address bar">
        <div class="omnibox__lock" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 7V5a3 3 0 1 1 6 0v2" stroke="var(--schemes\/on-surface)" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="7" width="10" height="8" rx="1.5" fill="var(--schemes\/on-surface)"/>
          </svg>
        </div>
        <span class="omnibox__domain" id="urlDomain">regent.com</span>
        <div class="omnibox__refresh" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5a5.47 5.47 0 0 1 3.89 1.61L10 6h4V2l-1.46 1.46" stroke="var(--schemes\/on-surface)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="abar-btn" role="button" aria-label="Tabs">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="7" width="12" height="14" rx="2" stroke="var(--schemes\/on-surface)" stroke-width="1.6"/>
          <path d="M8 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-2" stroke="var(--schemes\/on-surface)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="abar-btn" role="button" aria-label="More">
        <svg viewBox="0 0 24 24" fill="var(--schemes\/on-surface)" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="5"  r="1.5"/>
          <circle cx="12" cy="12" r="1.5"/>
          <circle cx="12" cy="19" r="1.5"/>
        </svg>
      </div>
    </div>

    <!-- Gesture navigation bar -->
    <div class="gesture-bar" aria-hidden="true">
      <div class="gesture-pill"></div>
    </div>

  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn active" id="btnLight" onclick="setMode('light')">Light</button>
    <button class="ctrl-btn"        id="btnDark"  onclick="setMode('dark')">Dark</button>
  </div>

<script>
  const params   = new URLSearchParams(location.search);
  /* null  → no ?url param → load default prototype
     ''    → ?url= passed explicitly → bare shell, no prototype */
  const urlParam  = params.get('url');
  const protoURL  = urlParam === null ? '../_prototype/mobile-header.html' : urlParam;
  const initMode = params.get('mode')   || 'light';
  const domain   = params.get('domain') || 'regent.com';

  const device    = document.getElementById('device');
  const frame     = document.getElementById('protoFrame');
  const clock     = document.getElementById('clock');
  const urlDomain = document.getElementById('urlDomain');

  urlDomain.textContent = domain;

  if (protoURL) frame.src = protoURL + (protoURL.includes('?') ? '&' : '?') + '_cb=' + Date.now();

  function updateClock() {
    const now = new Date();
    const h   = now.getHours();
    const m   = String(now.getMinutes()).padStart(2, '0');
    clock.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 15000);

  function setMode(mode) {
    device.dataset.mode = mode;
    document.getElementById('btnLight').classList.toggle('active', mode === 'light');
    document.getElementById('btnDark').classList.toggle('active',  mode === 'dark');
  }
  setMode(initMode);
</script>

</body>
</html>
