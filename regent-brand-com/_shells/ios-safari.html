<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS Safari Shell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Device frame ────────────────────────────────────────── */
    .device {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 47px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 40px 120px rgba(0,0,0,0.8);
    }

    /* CSS variables for icon fill/stroke color — inherited by all inline SVGs */
    .device[data-mode="light"] {
      background: #fff;
      --fill-0: #1b1b1b;
      --stroke-0: #1b1b1b;
      --icon-color: #1b1b1b;
      --icon-muted: rgba(0,0,0,0.4);
      --text-primary: #1b1b1b;
      --text-muted: rgba(0,0,0,0.45);
    }
    .device[data-mode="dark"] {
      background: #000;
      --fill-0: #ffffff;
      --stroke-0: #ffffff;
      --icon-color: #ffffff;
      --icon-muted: rgba(255,255,255,0.4);
      --text-primary: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
    }

    /* ─── Prototype iframe ────────────────────────────────────── */
    .proto-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 47px;   /* match device — prevents rectangular clip on mobile */
    }

    /* ─── Status bar ──────────────────────────────────────────── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 59px;
      z-index: 20;
      pointer-events: none;
      display: flex;
      align-items: center;
      padding-top: 13px;
    }

    /* Blur layer — masked so it fades out at the bottom */
    .status-bar__blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
    }

    .status-bar__time {
      position: absolute;
      left: 0;
      width: 135px;           /* left wing: from edge to DI start */
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
      line-height: 1;
      color: var(--text-primary);
    }

    .status-bar__icons {
      position: absolute;
      right: 35px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 7.33px;
    }

    /* Battery wrapper — fill bar + shell overlay */
    .battery-wrap {
      position: relative;
      width: 27.333px;
      height: 13.667px;
      flex-shrink: 0;
    }
    .battery-wrap__fill {
      position: absolute;
      left: 2px;
      top: 50%; transform: translateY(-50%);
      width: 21px;
      height: 9px;
      border-radius: 2.667px;
      background: var(--fill-0, #1b1b1b);
    }
    .battery-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ─── Dynamic Island ──────────────────────────────────────── */
    .dynamic-island {
      position: absolute;
      top: 13px;
      left: 50%; transform: translateX(-50%);
      width: 122px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 30;
      pointer-events: none;
    }

    /* ─── Bottom blur backdrop ────────────────────────────────── */
    .bottom-blur {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 110px;
      z-index: 19;
      pointer-events: none;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);
      mask-image: linear-gradient(to top, black 30%, transparent 100%);
    }

    /* ─── Toolbar — three separate floating pills ─────────────── */
    .toolbar {
      position: absolute;
      bottom: 34px;
      left: 50%; transform: translateX(-50%) scale(1);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
      transform-origin: center bottom;
    }

    .tb-pill {
      height: 48px;
      border-radius: 24px;
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      border: 1px solid;
    }

    .device[data-mode="light"] .tb-pill {
      background: rgba(250,250,250,0.7);
      border-color: #fff;
      box-shadow: 0 2px 40px rgba(0,0,0,0.10);
    }
    .device[data-mode="dark"] .tb-pill {
      background: rgba(21,21,21,0.8);
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 2px 40px rgba(0,0,0,0.10);
    }

    /* Back button */
    .tb-back { width: 48px; }
    .tb-back svg { width: 22px; height: 22px; color: var(--icon-color); }

    /* URL bar */
    .tb-url {
      width: 218px;
      height: 48px;
      position: relative;
      box-shadow: 0 2px 42px rgba(0,0,0,0.10) !important;
    }

    .tb-url__icon-left {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      width: 15.2px; height: 18.2px;
    }
    .tb-url__icon-left svg { width: 100%; height: 100%; }

    .tb-url__domain {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.2px;
      white-space: nowrap;
      color: var(--text-primary);
    }

    .tb-url__icon-right {
      position: absolute;
      right: 12.24px; top: 50%; transform: translateY(-50%);
      width: 14.957px; height: 18.182px;
    }
    .tb-url__icon-right svg { width: 100%; height: 100%; }

    /* More button */
    .tb-more { width: 48px; }
    .tb-more__dots {
      display: flex; gap: 3.5px; align-items: center;
    }
    .tb-more__dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--icon-color);
    }

    /* ─── Scrolled pill ───────────────────────────────────────── */
    .scroll-pill {
      position: absolute;
      bottom: 34px;
      left: 50%; transform: translateX(-50%) scale(0.82);
      height: 32px;
      padding: 9px 18px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 2px 40px rgba(0,0,0,0.10);
      transform-origin: center bottom;
    }

    .device[data-mode="light"] .scroll-pill {
      background: rgba(250,250,250,0.7);
      border-color: #fff;
    }
    .device[data-mode="dark"] .scroll-pill {
      background: rgba(21,21,21,0.8);
      border-color: rgba(255,255,255,0.12);
    }

    .scroll-pill__text {
      font-size: 12px;
      font-weight: 510;
      letter-spacing: 0.12px;
      color: var(--text-primary);
    }

    /* ─── Scrolled state ──────────────────────────────────────── */
    .device.scrolled .toolbar     { opacity: 0; pointer-events: none; transform: translateX(-50%) scale(0.82); }
    .device.scrolled .scroll-pill { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }

    /* ─── Home indicator ──────────────────────────────────────── */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      border-radius: 3px;
      z-index: 25;
      pointer-events: none;
    }
    .device[data-mode="light"] .home-bar { background: rgba(0,0,0,0.22); }
    .device[data-mode="dark"]  .home-bar { background: rgba(255,255,255,0.28); }

    /* ─── External controls ───────────────────────────────────── */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
      z-index: 200;
    }

    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    .ctrl-btn:hover  { background: rgba(255,255,255,0.18); }
    .ctrl-btn.active { background: rgba(255,255,255,0.28); }
  </style>
</head>

            <path d="M7.19277 8.51113C7.4125 8.51113 7.57949 8.44082 7.71133 8.30898L11.1303 4.86367C11.2885 4.70547 11.3588 4.52969 11.3588 4.32754C11.3588 4.13418 11.2797 3.94082 11.1303 3.79141L7.71133 0.319727C7.57949 0.179102 7.4125 0.1 7.19277 0.1C6.79727 0.1 6.48965 0.425195 6.48965 0.838281C6.48965 1.02285 6.55996 1.19863 6.68301 1.34805L8.82754 3.43984C8.3793 3.36074 7.92227 3.32559 7.47402 3.32559C3.37832 3.32559 0.1 6.59512 0.1 10.6908C0.1 14.7865 3.38711 18.0824 7.48281 18.0824C11.5697 18.0824 14.8568 14.7865 14.8568 10.6908C14.8568 10.2602 14.5492 9.94375 14.1098 9.94375C13.6879 9.94375 13.4066 10.2602 13.4066 10.6908C13.4066 13.9867 10.7699 16.6322 7.48281 16.6322C4.18691 16.6322 1.5502 13.9867 1.5502 10.6908C1.5502 7.38613 4.17813 4.7582 7.47402 4.7582C8.08047 4.7582 8.62539 4.80215 9.10879 4.89883L6.6918 7.29824C6.55996 7.43887 6.48965 7.60586 6.48965 7.79043C6.48965 8.20352 6.79727 8.51113 7.19277 8.51113Z" fill="var(--fill-0, #1B1B1B)" stroke="var(--stroke-0, #1B1B1B)" stroke-width="0.2"/>
          </svg>
        </div>

      </div>

      <!-- More button — three dots (Figma uses SF Compact PUA, not cross-platform) -->
      <div class="tb-pill tb-more" role="button" aria-label="More">
        <div class="tb-more__dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>

    </div>

    <!-- Scrolled pill -->
    <div class="scroll-pill" id="scrollPill" role="button" aria-label="URL bar">
      <span class="scroll-pill__text" id="pillDomain">regent.com</span>
    </div>

    <!-- Home indicator -->
    <div class="home-bar" aria-hidden="true"></div>

  </div>

  <!-- Controls (outside device) -->
  <div class="controls">
    <button class="ctrl-btn active" id="btnLight" onclick="setMode('light')">Light</button>
    <button class="ctrl-btn" id="btnDark"  onclick="setMode('dark')">Dark</button>
    <button class="ctrl-btn" id="btnScroll" onclick="toggleScroll()">Scrolled</button>
  </div>

<script>
  /* ── Params ───────────────────────────────────────────────── */
  const params   = new URLSearchParams(location.search);
  /* null  → no ?url param → load default prototype
     ''    → ?url= passed explicitly → bare shell, no prototype */
  const urlParam  = params.get('url');
  const protoURL  = urlParam === null ? '../_prototype/destinations-cards-mobile.html' : urlParam;
  const initMode  = params.get('mode')   || 'light';
  const domain    = params.get('domain') || 'regent.com';

  const device     = document.getElementById('device');
  const frame      = document.getElementById('protoFrame');
  const clock      = document.getElementById('clock');
  const urlDomain  = document.getElementById('urlDomain');
  const pillDomain = document.getElementById('pillDomain');
  const btnLight   = document.getElementById('btnLight');
  const btnDark    = document.getElementById('btnDark');
  const btnScroll  = document.getElementById('btnScroll');

  /* ── Domain ───────────────────────────────────────────────── */
  urlDomain.textContent  = domain;
  pillDomain.textContent = domain;

  /* ── Load prototype ───────────────────────────────────────── */
  if (protoURL) frame.src = protoURL + (protoURL.includes('?') ? '&' : '?') + '_cb=' + Date.now();

  /* ── Live clock ───────────────────────────────────────────── */
  function updateClock() {
    const now = new Date();
    clock.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  }
  updateClock();
  setInterval(updateClock, 15000);

  /* ── Mode ─────────────────────────────────────────────────── */
  function setMode(mode) {
    device.dataset.mode = mode;
    btnLight.classList.toggle('active', mode === 'light');
    btnDark.classList.toggle('active',  mode === 'dark');
  }
  setMode(initMode);

  /* ── Scroll state ─────────────────────────────────────────── */
  let scrolled = false;
  function toggleScroll() {
    scrolled = !scrolled;
    device.classList.toggle('scrolled', scrolled);
    btnScroll.classList.toggle('active', scrolled);
  }

  document.getElementById('scrollPill').addEventListener('click', () => {
    if (scrolled) toggleScroll();
  });

  /* ── Scroll detection — same-origin direct listener ─────── */
  frame.addEventListener('load', () => {
    try {
      const iframeDoc = frame.contentDocument || frame.contentWindow.document;
      // Listen on the document in capture phase to catch scroll on any element
      let prevScrollTop = 0;

      iframeDoc.addEventListener('scroll', (e) => {
        const scrollTop = e.target.scrollTop ?? 0;
        const scrollingDown = scrollTop > prevScrollTop;

        if (scrollingDown && !scrolled && scrollTop > 40) {
          // Scrolling down past threshold → collapse to pill
          toggleScroll();
        } else if (!scrollingDown && scrolled) {
          // Any upward scroll → restore toolbar
          toggleScroll();
        }

        prevScrollTop = scrollTop;
      }, { capture: true, passive: true });
    } catch (e) {
      // Cross-origin fallback — listen for postMessage
    }
  });

  /* ── postMessage fallback (non-same-origin prototypes) ───── */
  window.addEventListener('message', e => {
    if (e.data?.type === 'scroll') {
      if (e.data.scrolled !== scrolled) toggleScroll();
    }
  });
</script>
